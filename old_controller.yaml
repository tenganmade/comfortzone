- alias: Comfortzone Apply HW Reduction After Long HW Run
  id: comfortzone_apply_hw_reduction
  trigger:
    - platform: state
      entity_id: sensor.comfortzone_pump_activity_status
      to: Making Hot Water
      for:
        hours: 1
        minutes: 30
  condition:
    - condition: state
      entity_id: input_select.comfortzone_current_optimization_mode
      state:
        - Default
        - Cheap Price Intensify
    - condition: state
      entity_id: input_boolean.comfortzone_hw_reduction_active
      state: "off"
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.comfortzone_hw_reduction_active
    - service: system_log.write
      data:
        level: info
        logger: comfortzone_hw_reduction
        message: Applying HW Reduction (-15C) due to long HW run.
  mode: single
- alias: Comfortzone Remove HW Reduction If No Need For Heating
  id: comfortzone_remove_hw_reduction_no_heating
  trigger:
    - platform: state
      entity_id: input_boolean.comfortzone_hw_reduction_active
      to: "on"
      for:
        minutes: 10
  condition:
    - condition: state
      entity_id: sensor.comfortzone_pump_activity_status
      state:
        - Idle
        - Making Hot Water
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.comfortzone_hw_reduction_active
    - service: system_log.write
      data:
        level: info
        logger: comfortzone_hw_reduction
        message: Removing HW Reduction due to no need for heating at this time.
  mode: single
- alias: Comfortzone Remove HW Reduction After Heating Run
  id: comfortzone_remove_hw_reduction
  trigger:
    - platform: state
      entity_id: input_boolean.comfortzone_hw_reduction_active
      to: "on"
      for:
        hours: 1
  action:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.comfortzone_hw_reduction_active
    - service: system_log.write
      data:
        level: info
        logger: comfortzone_hw_reduction
        message: Removing HW Reduction due to long Heating run.
  mode: single
- alias: "Comfortzone: Reset to Default When Disabled"
  id: comfortzone_reset_to_default_when_disabled
  description: "Resets climate and HW settings when the master optimization boolean is turned off."
  trigger:
    - platform: state
      entity_id: input_boolean.comfortzone_optimization_master_enabled
      to: "off"
  condition: []
  action:
    # Set the optimization mode selectors back to Default
    - service: input_select.select_option
      target:
        entity_id:
          - input_select.comfortzone_current_optimization_mode
          - input_select.comfortzone_hw_mode
      data:
        option: Default

    # Set the indoor temperature to its default
    - service: climate.set_temperature
      target:
        entity_id: climate.comfortzone_rx95_climate
      data:
        temperature: "{{ states('input_number.comfortzone_default_indoor_temp') | float(22.0) }}"

    # Set the heat curve to its default
    - service: number.set_value
      target:
        entity_id: number.comfortzone_rx95_heat_curve
      data:
        value: "{{ states('input_number.comfortzone_default_heat_curve') | float(4.0) }}"

    # Set the hot water setpoint to its default
    - service: number.set_value
      target:
        entity_id: number.comfortzone_rx95_hot_water_temp_setpoint
      data:
        value: "{{ states('input_number.comfortzone_default_hw_temp') | float(50.0) }}"
  mode: single
- alias: Comfortzone Settings Controller
  id: comfortzone_settings_controller
  trigger:
    - platform: time_pattern
      minutes: /5
    - platform: state
      entity_id: input_boolean.comfortzone_optimization_master_enabled
      to: "on"
    - platform: state
      entity_id: input_datetime.comfortzone_vacation_reduction
    - platform: state
      entity_id: switch.comfortzone_rx95_hot_water_extra
    - platform: state
      entity_id: input_number.comfortzone_default_heat_curve
    - platform: state
      entity_id: input_number.comfortzone_default_indoor_temp
    - platform: state
      entity_id: input_boolean.comfortzone_price_peak_enabled
    - platform: state
      entity_id: input_boolean.comfortzone_weather_anticipation_enabled
    - platform: state
      entity_id: input_boolean.energy_management_survive_solar
  condition:
    - condition: state
      entity_id: input_boolean.comfortzone_optimization_master_enabled
      state: "on"
    - condition: template
      value_template: "{{ not states('sensor.nord_pool_se3_price') in ['unavailable', 'unknown'] }}"
    - condition: template
      value_template: "{{ not states('sensor.comfortzone_rx95_outdoor_temp') in ['unavailable', 'unknown'] }}"
    - condition: template
      value_template: "{{ not states('sensor.nord_pool_se3_price_today') in ['unavailable', 'unknown'] }}"
    - condition: template
      value_template: "{{ not states('sensor.comfortzone_today_am_average_price') in ['unavailable', 'unknown'] }}"
    - condition: template
      value_template: "{{ not states('climate.comfortzone_rx95_climate') in ['unavailable', 'unknown'] }}"
  action:
    - variables:
        last_legionella_run_ts: "{{ states('input_datetime.comfortzone_last_legionella_run') | as_timestamp(0) }}"
        legionella_boost_end_ts: "{{ states('input_datetime.comfortzone_legionella_boost_end_time') | as_timestamp(0) }}"
        vacation_reduction_end_ts: "{{ states('input_datetime.comfortzone_vacation_reduction') | as_timestamp(0) }}"

        rx95_pump_now: "{{ states('sensor.comfortzone_pump_activity_status') | default('Idle') }}"
        rx95_hw_temp_now: "{{ states('sensor.comfortzone_rx95_hot_water_temp') | float(0) }}"
        rx95_hw_temp_set: "{{ states('number.comfortzone_rx95_hot_water_temp_setpoint') | float(0) }}"

        now_ts: "{{ now() | as_timestamp }}"
        current_hour: "{{ now().hour }}"
        current_minute: "{{ now().minute }}"
        next_hour: "{{ (current_hour + 1) % 24 }}"
        weather_forecast: "{{ state_attr('sensor.smhi_weather_forecast', 'forecast') | default([]) }}"
        weather_today_index: "{{ (0 if weather_forecast[0].datetime.startswith(now().strftime('%Y-%m-%d')) else 1) if weather_forecast and weather_forecast | count > 1 else 0 }}"
        future_lowest_temp: "{{ (weather_forecast[weather_today_index].templow if current_hour < 16 else weather_forecast[weather_today_index + 1].templow) if weather_forecast and weather_forecast | count > 1 else 0 }}"
        future_highest_temp: "{{ (weather_forecast[weather_today_index].temperature if current_hour < 16 else weather_forecast[weather_today_index + 1].temperature) if weather_forecast and weather_forecast | count > 1 else 0 }}"
        is_winter: "{{ future_highest_temp < 3 and weather_forecast[weather_today_index + 1].temperature < 3 and future_lowest_temp < -1 if weather_forecast and weather_forecast | count > 2 else now().month in [11, 12, 1, 2] }}"
        current_price: "{{ states('sensor.nord_pool_se3_price') | float(none) }}"
        today_avg_price: "{{ states('sensor.nord_pool_se3_price_today') | float(none) }}"
        cheap_midday_hours_list: "{{ state_attr('sensor.comfortzone_cheap_midday_hours_list', 'cheap_hours') | default([]) }}"
        cheap_hours_list: "{{ state_attr('sensor.comfortzone_cheap_hours_list', 'cheap_hours') | default([]) }}"
        min_legionella_days: "{{ states('input_number.comfortzone_legionella_min_days') | int(6) }}"
        max_legionella_days: "{{ states('input_number.comfortzone_legionella_max_days') | int(10) }}"
        days_since_legionella: "{{ ((now_ts - last_legionella_run_ts) / 86400) | int(99) }}"
        hours_to_vacation_end: "{{ ((vacation_reduction_end_ts - now_ts) / 3600) | int(0) }}"
        indoor_temp: "{{ states('sensor.comfortzone_rx95_indoor_temp') | float(0) }}"
        indoor_max_recent_temp: "{{ states('sensor.indoor_max_recent_temp') | float(0) }}"
        outdoor_temp: "{{ states('sensor.comfortzone_rx95_outdoor_temp') | float(0) }}"
        recent_avg_price: "{{ states('sensor.recent_average_electricity_cost') | float(0) }}"
        nordpool_threshold_price: "{{ states('input_number.comfortzone_nordpool_price_threshold') | int(100) }}"
        is_am: "{{ current_hour < 12 }}"
        is_sun_up: "{{ is_state('sun.sun', 'above_horizon') }}"
        is_legionella_boost_active: "{{ now_ts < legionella_boost_end_ts }}"
        is_legionella_enabled: "{{ is_state('input_boolean.comfortzone_legionella_boost_enabled', 'on') }}"
        is_cheap_boost_enabled: "{{ is_state('input_boolean.comfortzone_cheap_price_enabled', 'on') }}"
        is_price_peak_enabled: "{{ is_state('input_boolean.comfortzone_price_peak_enabled', 'on') }}"
        is_weather_enabled: "{{ is_state('input_boolean.comfortzone_weather_anticipation_enabled', 'on') }}"
        is_vacation_active: "{{ now_ts < vacation_reduction_end_ts }}"
        is_on_battery: "{{ is_state('binary_sensor.sigen_plant_battery_discharging', 'on') }}"
        has_pv_excess: "{{ is_state('binary_sensor.sigen_plant_pv_excess', 'on') }}"
        pv_forecast_today: "{{ states('sensor.solcast_pv_forecast_forecast_today') | float(0) }}"
        survive_on_solar: "{{ is_state('input_boolean.energy_management_survive_solar', 'on') }}"
        wait_for_sun: "{{ survive_on_solar and pv_forecast_today > 20 }}"
        is_bridge_active: "{{ is_state('binary_sensor.energy_bridge_to_solar', 'on') }}"
        is_sunny_day: "{{ is_state('binary_sensor.is_today_sunny_day_pv', 'on') }}"

        default_indoor_temp: "{{ states('input_number.comfortzone_default_indoor_temp') | float(22.0) }}"

    - variables:
        # Check compressor power on average because every 5 minutes it does Idle so checking at this time would be 0.
        compressor_now: "{{ states('sensor.comfortzone_rx95_compressor_power') | float(0) }}"
        avg_compressor_power_last_hour: "{{ states('sensor.comfortzone_average_compressor_power_last_hour') | float(0) }}"
        is_full_compressor: "{{ 2000 < avg_compressor_power_last_hour }}"
        addition_power: "{{ states('sensor.comfortzone_rx95_addition_power') | float(0) }}"
        not_using_addition: >
          {% set last_changed = states.sensor.comfortzone_rx95_addition_power.last_changed if states.sensor.comfortzone_rx95_addition_power is defined and states.sensor.comfortzone_rx95_addition_power is not none else none %}
          {# True ONLY if the effect is 0 AND has been for more than 30 minutes (1800 seconds) #}
          {{ addition_power == 0 and last_changed is not none and last_changed and (now() - last_changed).total_seconds() > 1800 }}
        # In winter we allow a bit more addition to save the lowest temperatures.
        not_winter_addition: "{{ not is_winter or addition_power < (600 if future_highest_temp < 0 or future_lowest_temp < -4 else 0) }}"
        heating_time_last_hour: "{{ states('sensor.comfortzone_heating_duration_last_hour') | float(0) }}"
        is_heating_alot: "{{ is_full_compressor and 0.8 < heating_time_last_hour }}"
        is_hw_reduction_active: "{{ is_state('input_boolean.comfortzone_hw_reduction_active', 'on') }}"
        is_evening_expensive: "{{ is_state('binary_sensor.comfortzone_expensive_evening_hours_forecast', 'on') }}"
        is_night_cold: "{{ future_lowest_temp <= 6 }}"
        expensive_am_list: "{{ state_attr('sensor.comfortzone_expensive_am_hours_list', 'expensive_am_hours') | default([0]) }}"
        expensive_pm_list: "{{ state_attr('sensor.comfortzone_expensive_pm_hours_list', 'expensive_pm_hours') | default([0]) }}"
        peak_expensive_am: "{{ (expensive_am_list | default([0]))[-1] | int(0) }}"
        peak_expensive_pm: "{{ (expensive_pm_list | default([0]))[-1] | int(0) }}"
        am_avg_price: "{{ states('sensor.comfortzone_today_am_average_price') | float(none) }}"
        pm_avg_price: "{{ states('sensor.comfortzone_today_pm_average_price') | float(none) }}"
        am_more_expensive: "{{ am_avg_price > pm_avg_price }}"
        today_is_cheap: "{{ has_pv_excess and not is_am or (recent_avg_price > today_avg_price * 1.1 and recent_avg_price > am_avg_price and recent_avg_price > pm_avg_price) }}"
        current_hour_is_cheap: >
          {% if has_pv_excess and not is_am or current_price < 0 or (not is_on_battery and current_price <= 0.9 * today_avg_price) %}
            {{ true }}
          {% elif (current_price is not none) and is_winter and (current_price < 1.1 * today_avg_price or current_price < 0.9 * recent_avg_price) %}
            {{ true }}
          {% elif (current_price is not none) and current_price <= 0.9 * today_avg_price and (is_winter or current_price < 0.5 * recent_avg_price) %}
            {% if is_am %}
              {{ current_price < am_avg_price}}
            {% else %}
              {{ current_price < pm_avg_price }}
            {% endif %}
          {% else %}
            {{ false }}
          {% endif %}
        is_current_hour_cheap_or_avg: "{{ has_pv_excess and not is_am or current_price < 0 or (current_price is not none) and current_price <= today_avg_price and current_price <= nordpool_threshold_price }}"
        is_current_hour_cheaper_than_avg: "{{ has_pv_excess and not is_am or current_price < 0 or (current_price is not none) and current_price <= 0.9 * today_avg_price and current_price <= nordpool_threshold_price }}"
        is_next_pm_hour_expensive: >
          {% if expensive_pm_list is iterable and expensive_pm_list is not string %}
            {{ next_hour in expensive_pm_list }}
          {% else %}
            {{ false }}
          {% endif %}
        is_price_peak_mode_conditions_met: >
          {% set check_hour_am, check_hour_pm, check_next_hour_am, check_next_hour_pm = false, false, false, false %}
          {% if expensive_am_list is iterable and expensive_am_list is not string %}
            {% set check_hour_am = current_hour in expensive_am_list %}
            {% set check_next_hour_am = (current_minute >= 50 and next_hour in expensive_am_list) %}
          {% endif %}
          {% if expensive_pm_list is iterable and expensive_pm_list is not string %}
            {% set check_hour_pm = current_hour in expensive_pm_list %}
            {% set check_next_hour_pm = (current_minute >= 50 and next_hour in expensive_pm_list) %}
          {% endif %}
          {{ is_price_peak_enabled and not has_pv_excess and 
            ( is_bridge_active or
              (not is_winter or not today_is_cheap) and 
              (not is_on_battery or wait_for_sun) and 
              (wait_for_sun or check_hour_am or check_next_hour_am or check_hour_pm or check_next_hour_pm)
            ) }}
        time_to_sunrise: >
          {{ [(as_timestamp(state_attr('sun.sun', 'next_rising'), now_ts) - now_ts) / 3600, 0] | max | round(0) }}
        weather_temp_logic: >
          {{ (future_highest_temp >= 3 and (weather_forecast[weather_today_index].condition in ['sunny', 'partlycloudy'] or is_sunny_day) and outdoor_temp >= -3 and (time_to_sunrise <= 4 or is_sun_up)) or (future_highest_temp >= 3 or (future_highest_temp >= 1 and is_sunny_day) and outdoor_temp >= -2 and (time_to_sunrise <= 3 or is_sun_up)) or (indoor_temp - 0.3 > default_indoor_temp and future_highest_temp >= 4 and not is_winter and (time_to_sunrise <= 4 or is_sun_up)) }}
        is_weather_active_conditions_met: >
          {{ (not has_pv_excess and (is_bridge_active or wait_for_sun))
            or 
            ( is_weather_enabled and 
              (is_am and indoor_max_recent_temp >= default_indoor_temp - 0.8 or current_hour >= 22) and 
              (weather_temp_logic or (not is_night_cold or outdoor_temp >= 13)) and 
              (current_price >= 0 and current_price >= today_avg_price)
            )
          }}
        is_cheap_price_conditions_met: >
          {{ is_cheap_boost_enabled and (current_hour_is_cheap and (not_using_addition or not_winter_addition) or 
          (future_lowest_temp < -1 and rx95_hw_temp_now - rx95_hw_temp_set > -2)) }}
        min_climate_temp: 10.0
        max_climate_temp: 25.0
        min_heat_curve: 0.0
        max_heat_curve: 6.0

        # --- Determine EFFECTIVE Default values and possibly Adjusted for Vacation Mode ---
        default_indoor_temp_helper: >
          {% if is_vacation_active and hours_to_vacation_end < 5 %}
            {{ [default_indoor_temp - 1.0, min_climate_temp] | max }}
          {% elif is_vacation_active %}
            {{ [default_indoor_temp - 2.0, min_climate_temp] | max }}
          {% else %}
            {{ default_indoor_temp }}
          {% endif %}
        default_heat_curve_helper: >
          {% set base_val = states('input_number.comfortzone_default_heat_curve') | float(4.0) %}
          {% if is_vacation_active and hours_to_vacation_end < 5 %}
            {{ [base_val - 0.5, min_heat_curve] | max | round(1) }}
          {% elif is_vacation_active %}
            {{ [base_val - 1.0, min_heat_curve] | max | round(1) }}
          {# Extra boost for last hour before expensive PM hours with price peak so no heating for a few hours will happen. #}
          {% elif is_cheap_price_conditions_met and not current_hour_is_cheap and is_evening_expensive and is_night_cold %}
            {{ [base_val + 0.5, max_heat_curve] | min | round(1) }}
          {% else %}
            {{ base_val }} {# Normal Default #}
          {% endif %}
        default_hw_temp_helper: >
          {% set base_val = states('input_number.comfortzone_default_hw_temp') | float(50.0) %}
          {% if is_vacation_active %}
            40.0
          {% else %}
            {{ base_val }}
          {% endif %}

        weather_anticipation_curve: >
          {% if not is_winter and future_highest_temp >= 9 and outdoor_temp >= -3 and (weather_forecast[weather_today_index].condition in ['sunny', 'partlycloudy'] or is_sunny_day) %}
            {{ [1.0 | float, min_heat_curve] | max | round(1) }}
          {% elif not is_winter and is_heating_alot %}
            {{ [(default_heat_curve_helper | float) - 2.0, min_heat_curve] | max | round(1) }}
          {% elif indoor_max_recent_temp >= default_indoor_temp - 0.8 %}
            {{ [(default_heat_curve_helper | float) - 1.0, min_heat_curve] | max | round(1) }}
          {% else %}
            {{ (default_heat_curve_helper | float) }}
          {% endif %}

        price_peak_temp_adjustment: >
          {% if not not_using_addition %}
            1.5
          {% elif is_winter and not not_winter_addition %}
            1.0
          {% elif is_winter and is_night_cold and current_hour != peak_expensive_am and current_hour != peak_expensive_pm %}
            0.5
          {% elif (outdoor_temp < 6 or is_night_cold) and current_hour != peak_expensive_am and current_hour != peak_expensive_pm %}
            1.3
          {% elif outdoor_temp > 12 %}
            2.5
          {% else %}
            2.0
          {% endif %}

        price_peak_curve_adjustment: >
          {% if is_winter and is_night_cold and outdoor_temp > -1 and current_hour != peak_expensive_am and current_hour != peak_expensive_pm %}
            0.5
          {% elif (outdoor_temp < 6 or is_night_cold) and current_hour != peak_expensive_am and current_hour != peak_expensive_pm %}
            0.7
          {% elif outdoor_temp > 12 %}
            2.0
          {% elif is_winter and outdoor_temp < -1 %}
            0.0
          {% else %}
            1.1
          {% endif %}

        cheap_price_temp: >
          {% if not_using_addition and (not is_winter or default_indoor_temp_helper - indoor_temp < 0.5) %}
            {{ [indoor_temp + ([[max_climate_temp - indoor_temp - 0.1, 1.0] | min, 0.5] | max if not is_winter or not is_full_compressor or not_winter_addition else 0.5), max_climate_temp] | min }}
          {% elif not_using_addition %}
            {{ [indoor_temp + 0.5, max_climate_temp] | min }}
          {% else %}
            {{ [indoor_temp, max_climate_temp] | min }}
          {% endif %}

        cheap_price_curve_adjustment: >
          {% if not_using_addition and compressor_now < 3400 and not is_full_compressor %}
            {{ max_heat_curve }}
          {% elif not_using_addition and not is_full_compressor %}
            {{ [(default_heat_curve_helper | float) + 1.5, max_heat_curve] | min | round(1) }}
          {% elif not_using_addition %}
            {{ [(default_heat_curve_helper | float) + 1.0, max_heat_curve] | min | round(1) }}
          {% else %}
            {{ default_heat_curve_helper }}
          {% endif %}

    - if:
        - condition: state
          entity_id: input_boolean.comfortzone_optimization_master_enabled
          state: "on"
      then:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ is_weather_active_conditions_met }}"
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.comfortzone_current_optimization_mode
                  data:
                    option: Weather Anticipation Reduction
                - variables:
                    # FIX: Cast variables to float
                    temp_adjust: "{{ 4 if indoor_max_recent_temp > default_indoor_temp or future_highest_temp >= 9 and is_sunny_day else (3 if indoor_max_recent_temp >= default_indoor_temp - 0.3 else (2 if indoor_max_recent_temp >= default_indoor_temp - 0.8 else 1)) }}"
                    target_temp: "{{ [(default_indoor_temp_helper | float) - temp_adjust, min_climate_temp] | max }}"
                    target_curve: "{{ weather_anticipation_curve }}"
                - if:
                    - condition: template
                      value_template: "{{ state_attr('climate.comfortzone_rx95_climate', 'temperature') | float(none) != target_temp }}"
                  then:
                    - delay: 00:00:05
                    - service: climate.set_temperature
                      target:
                        entity_id: climate.comfortzone_rx95_climate
                      data:
                        temperature: "{{ target_temp }}"
                - if:
                    - condition: template
                      value_template: "{{ states('number.comfortzone_rx95_heat_curve') | float(none) != target_curve }}"
                  then:
                    - delay: 00:00:05
                    - service: number.set_value
                      target:
                        entity_id: number.comfortzone_rx95_heat_curve
                      data:
                        value: "{{ target_curve }}"
            - conditions:
                - condition: template
                  value_template: "{{ is_price_peak_mode_conditions_met }}"
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.comfortzone_current_optimization_mode
                  data:
                    option: Price Peak Reduction
                - variables:
                    # FIX: Cast variables to float before math
                    target_temp: "{{ [(default_indoor_temp_helper | float) - (price_peak_temp_adjustment | float), min_climate_temp] | max }}"
                    target_curve: "{{ [(default_heat_curve_helper | float) - (price_peak_curve_adjustment | float), min_heat_curve] | max | round(1) }}"
                - if:
                    - condition: template
                      value_template: "{{ state_attr('climate.comfortzone_rx95_climate', 'temperature') | float(none) != target_temp }}"
                  then:
                    - delay: 00:00:05
                    - service: climate.set_temperature
                      target:
                        entity_id: climate.comfortzone_rx95_climate
                      data:
                        temperature: "{{ target_temp }}"
                - if:
                    - condition: template
                      value_template: "{{ states('number.comfortzone_rx95_heat_curve') | float(none) != target_curve }}"
                  then:
                    - delay: 00:00:05
                    - service: number.set_value
                      target:
                        entity_id: number.comfortzone_rx95_heat_curve
                      data:
                        value: "{{ target_curve }}"
            - conditions:
                - condition: template
                  value_template: "{{ is_cheap_price_conditions_met }}"
              sequence:
                - service: input_select.select_option
                  target:
                    entity_id: input_select.comfortzone_current_optimization_mode
                  data:
                    option: Cheap Price Intensify
                - variables:
                    # FIX: Cast variables to float
                    target_temp: "{{ cheap_price_temp | float }}"
                    target_curve: "{{ [(default_heat_curve_helper | float) + (cheap_price_curve_adjustment | float), max_heat_curve] | min }}"
                - if:
                    - condition: template
                      value_template: "{{ state_attr('climate.comfortzone_rx95_climate', 'temperature') | float(none) != target_temp }}"
                  then:
                    - delay: 00:00:05
                    - service: climate.set_temperature
                      target:
                        entity_id: climate.comfortzone_rx95_climate
                      data:
                        temperature: "{{ target_temp }}"
                - if:
                    - condition: template
                      value_template: "{{ states('number.comfortzone_rx95_heat_curve') | float(none) != target_curve }}"
                  then:
                    - delay: 00:00:05
                    - service: number.set_value
                      target:
                        entity_id: number.comfortzone_rx95_heat_curve
                      data:
                        value: "{{ target_curve }}"
          default:
            - service: input_select.select_option
              target:
                entity_id: input_select.comfortzone_current_optimization_mode
              data:
                option: Default
            - variables:
                target_temp: >
                  {% if not_using_addition and is_winter and (today_is_cheap or is_night_cold) %}
                    {{ [default_indoor_temp_helper | float, indoor_temp + 0.4, max_climate_temp] | min }}
                  {% elif not_using_addition and ((is_current_hour_cheap_or_avg or is_next_pm_hour_expensive) or (is_on_battery and not_winter_addition)) %}
                    {{ default_indoor_temp_helper }}
                  {% elif not_using_addition or has_pv_excess and not_winter_addition %}
                    {{ [(default_indoor_temp_helper | float) - 0.5, min_climate_temp] | max }}
                  {% elif not_winter_addition %}
                    {{ [(default_indoor_temp_helper | float) - 1.0, min_climate_temp] | max }}
                  {% else %}
                    {{ [(default_indoor_temp_helper | float) - 1.5, min_climate_temp] | max }}
                  {% endif %}
                curve_to_set: >
                  {% if (is_current_hour_cheaper_than_avg and not_using_addition) or is_next_pm_hour_expensive %}
                    {{ [(default_heat_curve_helper | float) + 0.5, max_heat_curve] | min | round(1) }}
                  {% elif (not_using_addition or is_winter) and (has_pv_excess or is_on_battery or today_is_cheap or is_night_cold or is_current_hour_cheap_or_avg) %}
                    {{ default_heat_curve_helper }}
                  {% else %}
                    {{ [(default_heat_curve_helper | float) - 0.5, min_heat_curve] | max | round(1) }}
                  {% endif %}
            - if:
                - condition: template
                  value_template: "{{ target_temp != state_attr('climate.comfortzone_rx95_climate', 'temperature') | float(none) }}"
              then:
                - delay: 00:00:05
                - service: climate.set_temperature
                  target:
                    entity_id: climate.comfortzone_rx95_climate
                  data:
                    temperature: "{{ target_temp }}"
            - if:
                - condition: template
                  value_template: "{{ curve_to_set != states('number.comfortzone_rx95_heat_curve') | float(none) }}"
              then:
                - delay: 00:00:05
                - service: number.set_value
                  target:
                    entity_id: number.comfortzone_rx95_heat_curve
                  data:
                    value: "{{ curve_to_set }}"
        - variables:
            current_main_mode: "{{ states('input_select.comfortzone_current_optimization_mode') }}"
            base_default_hw: >
              {% if is_current_hour_cheaper_than_avg or (is_evening_expensive and is_night_cold and current_hour <= 19) %}
                {{ default_hw_temp_helper }}
              {% else %}
                {{ [(default_hw_temp_helper | float) - 5.0, 30.0] | max }}
              {% endif %}
            hw_target_temp: >
              {% set min_hw = 30.0 %}
              {% set max_hw = 60.0 %}
              {% if is_state('switch.comfortzone_rx95_hot_water_extra', 'on') %}
                {{ states('number.comfortzone_rx95_hot_water_temp_setpoint') | float if not is_legionella_boost_active else [60, max_hw] | min }}
              {% elif is_cheap_price_conditions_met and (not_using_addition or is_winter and addition_power < 1000) %}
                {% if is_legionella_boost_active %}
                  {{ [60, max_hw] | min }}
                {% elif has_pv_excess and not_using_addition %}
                  {{ [rx95_hw_temp_now + 5, max_hw] | min }}
                {% else %}
                  {{ default_hw_temp_helper }}
                {% endif %}
              {# Priority: ExpensiveEve/ColdNight > Price Peak > HW Reduction > Legionella > Mid-day > Night > Default/Weather #}
              {% elif (is_evening_expensive or is_night_cold) and (10 <= current_hour <= 17) and not_using_addition %}
                {% if is_legionella_boost_active and current_main_mode != 'Price Peak Reduction' %}
                  {{ [60, max_hw] | min }}
                {# Run mid day to save hot water at night if cold and expensive so better do it now, over riding Price Peak. #}
                {% elif (current_hour in cheap_midday_hours_list) or has_pv_excess and false == is_heating_alot %}
                  {{ [rx95_hw_temp_now + 5, max_hw] | min }}
                {% elif (is_on_battery or current_hour in cheap_midday_hours_list) or is_current_hour_cheaper_than_avg %}
                  {{ [(default_hw_temp_helper | float) + 5.0, max_hw] | min }}
                {% elif (current_hour in cheap_hours_list) %}
                  {{ default_hw_temp_helper }}
                {% else  %}
                  {{ [(default_hw_temp_helper | float) - 5.0, 30.0] | max }}
                {% endif %}
              {% elif current_main_mode == 'Price Peak Reduction' %}
                {{ [40, min_hw] | max }}
              {% elif is_hw_reduction_active %}
                {{ [(default_hw_temp_helper | float) - 15.0, min_hw] | max }}
              {% elif is_legionella_boost_active %}
                {{ [60, max_hw] | min }}
              {% elif (0 <= current_hour <= 4) and is_current_hour_cheaper_than_avg and not_using_addition %}
                {# Night boost is Default + 5 #}
                {{ [(default_hw_temp_helper | float) + 5.0, max_hw] | min }}
              {% elif not not_using_addition and (not is_winter or addition_power > 1000) %}
                {{ [40, min_hw] | max }}
              {% else %}
                {{ base_default_hw }}
              {% endif %}
            hw_mode: >
              {% if (is_evening_expensive or is_night_cold) and (10 <= current_hour <= 17) and not_using_addition %}
                 {{ 'Mid-day Boost' if (current_hour in cheap_midday_hours_list or is_current_hour_cheaper_than_avg) else 'Default' }}
              {% elif current_main_mode == 'Price Peak Reduction' %}
                Price Peak Reduction
              {% elif is_hw_reduction_active %}
                Heating Priority
              {% elif is_legionella_boost_active %}
                Legionella Boost
              {% elif (0 <= current_hour <= 4) and is_current_hour_cheaper_than_avg and not_using_addition %}
                Night Boost
              {% else %}
                Default
              {% endif %}
        - if:
            - condition: template
              value_template: "{{ hw_mode != states('input_select.comfortzone_hw_mode') | float(none) }}"
          then:
            - service: input_select.select_option
              target:
                entity_id: input_select.comfortzone_hw_mode
              data:
                option: "{{ hw_mode }}"
        - if:
            - condition: template
              value_template: "{{ is_state('switch.comfortzone_rx95_hot_water_extra', 'off') and hw_target_temp != states('number.comfortzone_rx95_hot_water_temp_setpoint') | float(none) }}"
          then:
            - delay: 00:00:05
            - service: number.set_value
              target:
                entity_id: number.comfortzone_rx95_hot_water_temp_setpoint
              data:
                value: "{{ hw_target_temp }}"
    - if:
        - condition: state
          entity_id: input_boolean.comfortzone_legionella_boost_enabled
          state: "on"
        - condition: template
          value_template: "{{ not is_legionella_boost_active }}"
        - condition: template
          value_template: "{{ days_since_legionella >= min_legionella_days }}"
        - condition: template
          value_template: "{{ states('input_select.comfortzone_current_optimization_mode') != 'Price Peak Reduction' }}"
        - condition: or
          conditions:
            - condition: template
              value_template: "{{ days_since_legionella >= max_legionella_days }}"
            - condition: template
              value_template: "{{ is_current_hour_cheap_or_avg }}"
      then:
        - condition: template
          value_template: "{{ states('number.comfortzone_rx95_hot_water_temp_setpoint') | float(0) < 60.0 }}"
        - service: input_select.select_option
          target:
            entity_id: input_select.comfortzone_hw_mode
          data:
            option: Legionella Boost
        - service: system_log.write
          data:
            level: info
            logger: comfortzone_legionella_automation
            message: "Starting Legionella Boost (Days since last: {{ days_since_legionella }}). Setting HW temp to 60C."
        - delay: 00:00:05
        - service: number.set_value
          target:
            entity_id: number.comfortzone_rx95_hot_water_temp_setpoint
          data:
            value: 60.0
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.comfortzone_last_legionella_run
          data:
            datetime: "{{ now().isoformat() }}"
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.comfortzone_legionella_boost_end_time
          data:
            datetime: "{% set duration = states('input_number.comfortzone_legionella_duration_hours') | int(2) %} {{ (now() + timedelta(hours=duration)).isoformat() }}"
  mode: restart
- alias: "ComfortZone Update on High Power Peak"
  id: comfortzone_update_high_power
  description: "Update ComfortZone API if the house draws > 5kW and the battery is not charging"
  mode: single # Prevents multiple instances from running simultaneously

  trigger:
    - platform: numeric_state
      entity_id: sensor.sigen_plant_consumed_power
      above: 5

  condition:
    # Condition: We are NOT charging the battery right now
    # We check that your charging sensor is 'off'
    - condition: state
      entity_id: binary_sensor.sigen_battery_smart_charge
      state: "off"

  action:
    - service: homeassistant.update_entity
      data:
        entity_id:
          - climate.comfortzone_rx95_climate
